name: 3. CD Prod — Manual approval gate

on:
  workflow_dispatch:
    inputs:
      confirm_apim_cost:
        description: 'Confirmo que estou ciente do custo APIM Developer R$ 250/mes (sim/nao)'
        required: true
        default: 'nao'
        type: choice
        options:
          - 'sim'
          - 'nao'

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2
  ENV_NAME: prod
  RG_NAME: rg-helpsphere-ia-prod-prod

jobs:
  pre-flight:
    name: Pre-flight — confirma custo APIM
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ github.event.inputs.confirm_apim_cost }}" != "sim" ]; then
            echo "::error::Voce precisa confirmar ciencia do custo APIM Developer R\$ 250/mes."
            echo "Use input 'sim' OU mude apimSku para 'Consumption' em infra/envs/prod.parameters.json"
            exit 1
          fi
          echo "Custo confirmado. Prosseguindo."

  deploy-prod:
    name: Deploy → prod (requires approval)
    needs: pre-flight
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.azure.com/#@/resource/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-helpsphere-ia-prod-prod/overview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Az login (federated)
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}

      - name: Setup Bicep
        run: az bicep install

      - name: Validate
        run: |
          az deployment sub validate \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/prod.parameters.json

      - name: What-if (final review)
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/prod.parameters.json

      - name: Deploy
        id: deploy
        run: |
          az deployment sub create \
            --name "deploy-prod-${{ github.run_number }}" \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/prod.parameters.json \
            --output json > deploy-output.json
          echo "apim_gateway_url=$(jq -r '.properties.outputs.apimGatewayUrl.value' deploy-output.json)" >> $GITHUB_OUTPUT
          echo "apim_name=$(jq -r '.properties.outputs.apimName.value' deploy-output.json)" >> $GITHUB_OUTPUT

      - name: Post-deploy smoke
        run: |
          GATEWAY_URL="${{ steps.deploy.outputs.apim_gateway_url }}"
          APIM_NAME="${{ steps.deploy.outputs.apim_name }}"
          echo "==== Post-deploy smoke ===="
          echo "Gateway: $GATEWAY_URL"
          echo "APIM name: $APIM_NAME"

          # Check 1: APIM resource provisioned
          az apim show --name "$APIM_NAME" --resource-group "$RG_NAME" --query "provisioningState" -o tsv

          # Check 2: gateway DNS reachable
          curl -sS -o /dev/null -w "HTTP %{http_code} on gateway\n" \
            --max-time 30 \
            "$GATEWAY_URL" || echo "Gateway ainda inicializando"

          # Check 3: agent-api operation registered
          az apim api operation list \
            --resource-group "$RG_NAME" \
            --service-name "$APIM_NAME" \
            --api-id agent-api \
            --query "[].name" -o tsv

      - name: Upload deploy output
        uses: actions/upload-artifact@v4
        with:
          name: deploy-prod-output
          path: deploy-output.json
          retention-days: 90

      - name: Summary
        run: |
          echo "## Deploy production concluido :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **APIM gateway:** ${{ steps.deploy.outputs.apim_gateway_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APIM name:** ${{ steps.deploy.outputs.apim_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RG:** $RG_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Lembrete:** APIM Developer custa ~R\$ 250/mes ligado. Faca cleanup ao fim do lab." >> $GITHUB_STEP_SUMMARY
