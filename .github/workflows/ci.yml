name: 1. CI — Bicep + Python lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - 'eval/**'
      - '.github/workflows/ci.yml'
  push:
    branches-ignore: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AZURE_LOCATION: eastus2

jobs:
  bicep-lint:
    name: Bicep lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Az CLI + Bicep
        run: |
          az --version
          az bicep install
          az bicep version

      - name: Lint main.bicep
        run: az bicep lint --file infra/main.bicep

      - name: Lint modules/*.bicep
        run: |
          for f in infra/modules/*.bicep; do
            echo "::group::Lint $f"
            az bicep lint --file "$f"
            echo "::endgroup::"
          done

  bicep-build:
    name: Bicep build (compile to ARM JSON)
    runs-on: ubuntu-latest
    needs: bicep-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bicep
        run: az bicep install

      - name: Compile main.bicep
        run: az bicep build --file infra/main.bicep --outfile infra/main.json

      - name: Upload ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-arm-json
          path: infra/main.json
          retention-days: 7

  bicep-what-if:
    name: Bicep what-if (against dev env)
    runs-on: ubuntu-latest
    needs: bicep-build
    if: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_CLIENT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Az login (federated)
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}

      - name: What-if dev
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/dev.parameters.json \
            --result-format FullResourcePayloads

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: |
          ruff check src/ eval/ || true
          # Soft fail por enquanto — Bloco B inicial scaffold
          # Bloco C cravara fail strict
