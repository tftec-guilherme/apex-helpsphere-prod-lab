name: 2. CD Staging — Auto deploy on push main

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - '.github/workflows/cd-staging.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2
  ENV_NAME: staging
  RG_NAME: rg-helpsphere-ia-prod-staging

jobs:
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://portal.azure.com/#@/resource/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-helpsphere-ia-prod-staging/overview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Az login (federated)
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}

      - name: Setup Bicep
        run: az bicep install

      - name: Validate
        run: |
          az deployment sub validate \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/staging.parameters.json

      - name: Deploy
        id: deploy
        run: |
          az deployment sub create \
            --name "deploy-staging-${{ github.run_number }}" \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/envs/staging.parameters.json \
            --output json > deploy-output.json
          echo "apim_gateway_url=$(jq -r '.properties.outputs.apimGatewayUrl.value' deploy-output.json)" >> $GITHUB_OUTPUT

      - name: Smoke test — APIM gateway reachable
        run: |
          GATEWAY_URL="${{ steps.deploy.outputs.apim_gateway_url }}"
          echo "Testing $GATEWAY_URL"
          # APIM Developer leva ~30 min pra estabilizar primeiro deploy.
          # Smoke test soft: verifica DNS resolve, nao status code estrito.
          curl -sS -o /dev/null -w "HTTP %{http_code} on $GATEWAY_URL\n" \
            --max-time 30 \
            "$GATEWAY_URL" || echo "Gateway ainda inicializando (esperado em primeiro deploy)"

      - name: Upload deploy output
        uses: actions/upload-artifact@v4
        with:
          name: deploy-staging-output
          path: deploy-output.json
          retention-days: 30
